server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API → FastAPI backend container
    location /api/ {
        # Order submits carry the tax certificate base64-encoded in the JSON
        # body. The backend caps the file at 10 MB (CERT_MAX_BYTES); base64
        # adds ~33%, so allow 14 MB here — otherwise nginx 413s the request
        # before FastAPI can return its own validation message.
        client_max_body_size 14m;
        proxy_pass http://backend:8080;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /order_form (buyer form) and /admin (internal monitoring) are both
    # client-side routes served by the same bundle — main.jsx picks the page
    # from the path, so every non-asset request falls back to index.html.
    # The admin page is protected by the API session, not by nginx: its data
    # and file downloads all go through /api/admin/*, which requires sign-in.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
