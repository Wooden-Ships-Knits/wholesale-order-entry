server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API → FastAPI backend container
    location /api/ {
        # Order submits carry the tax certificate base64-encoded in the JSON
        # body. The backend caps the file at 10 MB (CERT_MAX_BYTES); base64
        # adds ~33%, so allow 14 MB here — otherwise nginx 413s the request
        # before FastAPI can return its own validation message.
        client_max_body_size 14m;
        proxy_pass http://backend:8080;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Conflict-check tool (/conflict.html) — internal, exposes the stockist
    # list. Before public exposure, enable basic auth (docs/conflict-checker.md):
    #   1. on the VM: printf "admin:$(openssl passwd -apr1)\n" > secrets/htpasswd
    #   2. docker-compose.yml nginx volumes: - ./secrets/htpasswd:/etc/nginx/htpasswd:ro
    #   3. uncomment this block and rebuild nginx:
    # location = /conflict.html {
    #     auth_basic "Wooden Ships internal";
    #     auth_basic_user_file /etc/nginx/htpasswd;
    # }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
