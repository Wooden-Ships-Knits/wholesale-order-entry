server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API → FastAPI backend container
    location /api/ {
        # Order submits carry the tax certificate base64-encoded in the JSON
        # body. The backend caps the file at 10 MB (CERT_MAX_BYTES); base64
        # adds ~33%, so allow 14 MB here — otherwise nginx 413s the request
        # before FastAPI can return its own validation message.
        client_max_body_size 14m;
        proxy_pass http://backend:8080;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Old conflict-tool bookmarks → it is now a tab inside /admin, which is
    # already behind the admin password (no basic auth needed).
    location = /conflict.html {
        return 301 /admin;
    }
    location = /check-conflict {
        return 301 /admin;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
